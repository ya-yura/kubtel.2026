name: Deploy GitHub Pages preview

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Setup Pages
        uses: actions/configure-pages@v6
        # If Pages is disabled, enable it in Settings -> Pages -> Source: GitHub Actions.
        # Auto-enablement requires a PAT in PAGES_ADMIN_TOKEN with Pages write/admin rights.
        with:
          enablement: ${{ secrets.PAGES_ADMIN_TOKEN != '' }}
          token: ${{ secrets.PAGES_ADMIN_TOKEN || github.token }}

      - name: Install dependencies
        run: npm ci

      - name: Validate
        run: npm run format:check && npm test && npm run launch:check

      - name: Build static preview
        run: |
          node scripts/prepare-pages-preview.mjs
          npm run build
        env:
          STATIC_PREVIEW: "true"
          PUBLIC_STATIC_PREVIEW: "true"
          PUBLIC_SITE_URL: https://ya-yura.github.io
          PUBLIC_BASE_PATH: /kubtel.2026/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v5
